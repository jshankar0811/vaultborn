<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaultborn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>VAULTBORN</h1>
      <div id="hud-right">
        <span id="hud-level">LVL 1</span>
        <span id="hud-floor">FLOOR 1</span>
        <span id="hud-gold">0g</span>
      </div>
    </header>

    <div id="main">
      <div id="canvas-wrap">
        <canvas id="game-canvas"></canvas>
      </div>

      <aside id="sidebar">
        <div class="panel" id="stats-panel">
          <div class="panel-title">CHARACTER</div>
          <div class="stat-row">
            <span class="stat-label">HP</span>
            <span id="hp-text" class="stat-value hp-val">20/20</span>
          </div>
          <div class="bar-wrap">
            <div class="bar"><div id="hp-fill" class="bar-fill hp"></div></div>
          </div>
          <div class="stat-row">
            <span class="stat-label">XP</span>
            <span id="xp-text" class="stat-value xp-val">0/15</span>
          </div>
          <div class="bar-wrap">
            <div class="bar"><div id="xp-fill" class="bar-fill xp"></div></div>
          </div>
          <div class="divider"></div>
          <div class="stat-row">
            <span class="stat-label">ATK</span>
            <span id="hud-atk" class="stat-value atk-val">4</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">DEF</span>
            <span id="hud-def" class="stat-value def-val">1</span>
          </div>
          <div id="effects-row" class="hidden">
            <div class="divider"></div>
            <div class="panel-title" style="margin-top:4px">EFFECTS</div>
            <div id="effects-list"></div>
          </div>
        </div>

        <div class="panel" id="equip-panel">
          <div class="panel-title">EQUIPMENT</div>
          <div id="equip-weapon" class="equip-slot empty">[ no weapon ]</div>
          <div id="equip-armor"  class="equip-slot empty">[ no armor ]</div>
        </div>

        <div class="panel" id="bag-panel">
          <div class="panel-title">BAG <span id="bag-hint">(P=potion U=scroll)</span></div>
          <ul id="inventory-list"></ul>
        </div>

        <div class="panel" id="map-panel">
          <div class="panel-title">MAP</div>
          <canvas id="minimap" width="128" height="75"></canvas>
        </div>

        <div class="panel" id="log-panel">
          <div class="panel-title">LOG</div>
          <ul id="message-log"></ul>
        </div>
      </aside>
    </div>

    <div id="controls-bar">
      <span>Move: WASD / arrows / hjkl</span>
      <span>Potion: P</span>
      <span>Scroll: U</span>
      <span>Click to move/attack</span>
    </div>

    <!-- Shop overlay -->
    <div id="shop-overlay" class="hidden">
      <div id="shop-box">
        <h2>MERCHANT</h2>
        <p id="shop-flavor"></p>
        <div id="shop-gold-row">Gold: <span id="shop-gold-amount">0</span>g</div>
        <div id="shop-items-list"></div>
        <button id="shop-leave">CONTINUE</button>
      </div>
    </div>

    <!-- Game over / win overlay -->
    <div id="overlay" class="hidden">
      <div id="overlay-box">
        <h2 id="overlay-title">YOU DIED</h2>
        <p id="overlay-stats"></p>
        <p id="overlay-msg"></p>
        <div id="high-scores-section">
          <div class="panel-title" style="margin-bottom:8px">BEST RUNS</div>
          <div id="high-scores-list"></div>
        </div>
        <button id="overlay-btn">PLAY AGAIN</button>
      </div>
    </div>

    <!-- Inspect tooltip -->
    <div id="inspect-tooltip" class="hidden">
      <div id="tt-name"></div>
      <div id="tt-stats"></div>
    </div>

    <!-- Floor fade -->
    <div id="fade-overlay"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
